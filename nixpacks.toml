# Nixpacks Configuration for Python/Flask
# This tells Railway how to build and run your app

providers.python = {}
providers.python.version = "3.11"

[nixpacks.envs.PORT] = "5000"
[nixpacks.envs.WEB_COMMAND] = "gunicorn api.server:app --bind 0.0.0.0:${PORT} --workers 2 --timeout 120"

# Install dependencies
[nixpacks.setup] = """
    pip install -r requirements.txt
"""

# Environment variables
[nixpacks.envs]
PYTHONUNBUFFERED = "1"